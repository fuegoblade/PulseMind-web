<html lang="cs">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143,0,255,0.1) 0%, #000 80%);
            z-index: -2;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* Back Arrow */
        .back-arrow {
            width: 16px;
            height: 16px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 6px #39ff14);
            transition: 0.3s;
        }
        
        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 10px #39ff14);
        }

        /* Sound Toggle Button */
        .sound-toggle {
            cursor: pointer;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            color: #39ff14;
            filter: drop-shadow(0 0 5px rgba(57, 255, 20, 0.5));
        }

        .sound-toggle.active {
            color: #39ff14;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .sound-toggle svg {
            width: 100%;
            height: 100%;
        }

        /* Image Section */
        .hero-image {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image img {
            width: 80%;
            max-width: 600px;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(143,0,255,0.15);
        }

        .hero-image::after {
            content: "";
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* Code Window */
        .code-window {
            max-width: 900px;
            margin: 40px auto 80px;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(143,0,255,0.3);
            box-shadow: 0 0 40px rgba(143,0,255,0.15), inset 0 0 20px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
        }

        .code-header {
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .purple { color: #8F00FF; text-shadow: 0 0 10px rgba(143,0,255,0.5); }
        .white { color: #ffffff; }

        .code-content {
            white-space: pre-wrap;
            display: inline; /* To align correctly with the cursor */
        }

        /* Třídy pro formátování psaného textu */
        .text-boot { color: #39ff14; font-weight: bold; opacity: 0.8; }
        .text-body { color: #d1d1d1; font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; }
        .text-summary { color: #00e5ff; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; display: block; margin-top: 20px; border-left: 3px solid #00e5ff; padding-left: 15px; }

        /* Neonový obdélníkový kurzor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.1em;
            background: #39ff14;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #39ff14;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin: 40px 0 40px;
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .code-window { padding: 25px; margin: 20px; font-size: 0.95rem; }
            .code-header { font-size: 1.1rem; }
            .text-body, .text-summary { font-size: 1rem; }
        }
    </style>
</head>

<body>

                summaryTitle: ">>> SHRNUTÍ PROTOKOLU <<<\n",

                copyright: "© 2026 FuegoBlade™. Všechna práva vyhrazena."
            },
            en: {
                title1: "Metabolic Architecture:",
                title2: "Fuel without guesswork",
                boot: "> METABOLIC CORE INITIALIZATION...\n> BIOCHEMICAL FUEL ANALYSIS...\n> ACCESS GRANTED.\n\n",
                body: "Most diet plans fail because they are static and ignore the most important thing – your current physiological reality. Food isn't just ordinary energy, but primarily biochemical information that instructs your cells whether to build muscle, burn fat, or repair damaged tissues.\n\nPulseMind™ approaches nutrition as precise metabolic engineering. The system constantly evaluates your training load, sleep quality, and nervous system state to accurately determine in real-time exactly what fuel your engine requires at any given moment.\n\nIf you've just finished an extreme performance and your body reports fatigue, the AI immediately adjusts the need for specific macronutrients and recommends targeted supplementation to accelerate cellular renewal and suppress inflammation. Conversely, on rest days, it smartly optimizes your intake so you don't store excess fat.\n\nThe interaction is absolutely minimalist – just snap a picture of your plate, and the artificial intelligence instantly decodes all nutritional values and puts them into the context of your entire day. You no longer have to dogmatically follow nutritional trends or strictly count every bite. PulseMind™ creates an absolutely dynamic, custom-tailored protocol for you, supplying your organism with exactly what it needs, at the best possible time.\n\n",
                summaryTitle: ">>> PROTOCOL SUMMARY <<<\n",
                summary: "Your diet will never again be based on guesswork, feelings, or blindly copying other people's meal plans. With PulseMind™, nutrition and supplementation turn into an exact science. You get a dynamic plan that intelligently responds to your actual output and current fatigue, so you can operate at your absolute maximum every day.",
                copyright: "© 2026 FuegoBlade™. All rights reserved."
            },
            de: {

                title2: "Treibstoff ohne Raten",
                boot: "> INITIALISIERUNG DES METABOLISCHEN KERNS...\n> ANALYSE DES BIOCHEMISCHEN TREIBSTOFFS...\n> ZUGRIFF GEWÄHRT.\n\n",
                body: "Die meisten Diätpläne scheitern, weil sie statisch sind und das Wichtigste ignorieren – deine aktuelle physiologische Realität. Essen ist nämlich nicht nur gewöhnliche Energie, sondern vor allem eine biochemische Information, die deinen Zellen den Befehl gibt, ob sie Muskeln aufbauen, Fett verbrennen oder beschädigte Gewebe reparieren sollen.\n\nPulseMind™ betrachtet Ernährung als präzises metabolisches Engineering. Das System wertet ständig deine Trainingsbelastung, Schlafqualität und den Zustand deines Nervensystems aus, um in Echtzeit genau zu bestimmen, welchen Treibstoff dein Motor in diesem Moment benötigt.\n\nWenn du gerade eine extreme Leistung erbracht hast und dein Körper Müdigkeit meldet, passt die KI sofort den Bedarf an spezifischen Makronährstoffen an und empfiehlt eine gezielte Supplementierung, um die Zellerneuerung zu beschleunigen und Entzündungen zu unterdrücken. An Ruhetagen hingegen optimiert sie deine Zufuhr clever, damit du kein überschüssiges Fett einlagerst.\n\nDie Interaktion ist dabei absolut minimalistisch – fotografiere einfach deinen Teller, und die künstliche Intelligenz entschlüsselt sofort alle Nährwerte und setzt sie in den Kontext deines gesamten Tages. Du musst keinen Ernährungstrends mehr dogmatisch folgen oder jeden Bissen kompliziert zählen. PulseMind™ erstellt für dich ein absolut dynamisches, maßgeschneidertes Protokoll, das deinen Organismus genau zur bestmöglichen Zeit mit dem versorgt, was er braucht.\n\n",
                summaryTitle: ">>> PROTOKOLLZUSAMMENFASSUNG <<<\n",

                copyright: "© 2026 FuegoBlade™. Alle Rechte vorbehalten."
            },
            es: {
                title1: "Arquitectura Metabólica:",
                title2: "Combustible sin conjeturas",
                boot: "> INICIALIZACIÓN DEL NÚCLEO METABÓLICO...\n> ANÁLISIS DE COMBUSTIBLE BIOQUÍMICO...\n> ACCESO CONCEDIDO.\n\n",
                body: "La mayoría de los planes de dieta fracasan porque son estáticos e ignoran lo más importante: tu realidad fisiológica actual. La comida no es solo energía ordinaria, sino principalmente información bioquímica que le indica a tus células si deben desarrollar músculo, quemar grasa o reparar tejidos dañados.\n\nPulseMind™ aborda la nutrición como una ingeniería metabólica precisa. El sistema evalúa constantemente tu carga de entrenamiento, la calidad del sueño y el estado de tu sistema nervioso para determinar con precisión en tiempo real qué combustible requiere tu motor en cada momento.\n\nSi acabas de realizar un esfuerzo extremo y tu cuerpo reporta fatiga, la IA ajusta inmediatamente la necesidad de macronutrientes específicos y recomienda una suplementación específica para acelerar la renovación celular y suprimir la inflamación. Por el contrario, en los días de descanso, optimiza de manera inteligente tu ingesta para que no almacenes exceso de grasa.\n\nLa interacción es absolutamente minimalista: solo toma una foto de tu plato y la inteligencia artificial descifra instantáneamente todos los valores nutricionales y los pone en el contexto de todo tu día. Ya no tienes que seguir dogmáticamente las tendencias nutricionales o contar cada bocado de manera complicada. PulseMind™ crea un protocolo absolutamente dinámico y hecho a medida para ti, suministrando a tu organismo exactamente lo que necesita, en el mejor momento posible.\n\n",
                summaryTitle: ">>> RESUMEN DEL PROTOCOLO <<<\n",
                summary: "Tu dieta nunca más se basará en conjeturas, sentimientos o en copiar a ciegas los planes de comidas de otras personas. Con PulseMind™, la nutrición y la suplementación se convierten en una ciencia exacta. Obtienes un plan dinámico que responde de manera inteligente a tu gasto real y fatiga actual, para que puedas funcionar a tu máximo absoluto todos los días.",
                copyright: "© 2026 FuegoBlade™. Todos los derechos reservados."
            }
        };

        const lang = localStorage.getItem("language") || "cs";
        const currentData = langData[lang] || langData["cs"];
        
        document.documentElement.lang = lang;
        document.getElementById("copyright-text").innerText = currentData.copyright;
        
        document.getElementById("section-title").innerHTML = `
            <span class="purple">${currentData.title1}</span> 
            <span class="white">${currentData.title2}</span>
        `;

        const contentBlocks = [
            { text: currentData.boot, cssClass: "text-boot" },
            { text: currentData.body, cssClass: "text-body" },
            { text: currentData.summaryTitle + currentData.summary, cssClass: "text-summary" }
        ];

        let blockIndex = 0;
        let charIndex = 0;
        const container = document.getElementById("typedText");
        let currentSpan = null;
        const typeSpeed = 15; 

        // --- AUDIO SYSTÉM PRO PÍPÁNÍ A TLAČÍTKO ---
        let audioCtx;
        let isSoundEnabled = false;

        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById("soundToggle");

            if (isSoundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                `;
            }
        }

        function playBeep() {
            if (!audioCtx || audioCtx.state === 'suspended' || !isSoundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch (e) {}
        }

        // --- EFEKT PSANÍ KÓDU ---
        function typeWriter() {
            if (blockIndex < contentBlocks.length) {
                if (charIndex === 0) {
                    currentSpan = document.createElement("span");
                    currentSpan.className = contentBlocks[blockIndex].cssClass;
                    container.appendChild(currentSpan);
                }
                
                let char = contentBlocks[blockIndex].text.charAt(charIndex);
                
                if (char === '\n') {
                    currentSpan.innerHTML += '<br>';
                } else {
                    currentSpan.innerHTML += char;
                }
                
                if (char !== ' ' && char !== '\n' && Math.random() > 0.6) {
                    playBeep();
                }

                charIndex++;
                
                if (charIndex >= contentBlocks[blockIndex].text.length) {
                    blockIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500);
                } else {
                    setTimeout(typeWriter, typeSpeed);
                }
            }
        }

        function goBack() {
            window.location.href = "web.html";
        }

        window.onload = () => {
            setTimeout(typeWriter, 400); 
        };
    </script>
</body>
