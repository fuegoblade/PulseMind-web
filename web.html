<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>PulseMind™</title>

    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive">

    <style>
        /*
         * App Basics & Core
         * ------------------------------------------------------------------
         */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /*
         * Cyber Background & Grid
         * ------------------------------------------------------------------
         */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143,0,255,0.1) 0%, #000 80%);
            z-index: -2;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image: 
              linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /*
         * ⚡ EKG Pulse (Neon Green)
         * ------------------------------------------------------------------
         */
        .ekg-container {
            position: absolute;
            top: 100px; /* Umístěno za hlavním nadpisem */
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
            pointer-events: none;
        }

        .ekg-line {
            fill: none;
            stroke: #39ff14;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px #39ff14) drop-shadow(0 0 12px #39ff14) drop-shadow(0 0 25px #39ff14);
            stroke-dasharray: 300 1500;
            animation: ekgPulse 2.4s linear infinite;
        }

        @keyframes ekgPulse {
            0% { stroke-dashoffset: 1800; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /*
         * Top Bar (Arrow & Logo)
         * ------------------------------------------------------------------
         */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .back-arrow {
            width: 14px;
            height: 14px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 4px #39ff14);
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .logo-wrapper {
            background: #fff;
            border-radius: 50%;
            width: 80px; /* Zvětšeno */
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Zabrání prosvítání bílých okrajů! */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(1.05); /* Jemný zoom, aby kruh bezpečně překryl hrany */
        }

        /*
         * Header (Title & Main Button)
         * ------------------------------------------------------------------
         */
        .header {
            text-align: center;
            margin-top: 150px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
        }

        .title {
            font-size: 3.2rem;
            font-weight: 900; 
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 0%, #d3b1ff 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(143, 0, 255, 0.3);
            margin-bottom: 20px;
        }

        /* Tlačítko Vstup do App (Design z úvodky) */
        .app-btn {
            width: 100%;
            max-width: 380px;
            padding: 18px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 900; 
            letter-spacing: 0.20em; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            background: linear-gradient(90deg, #8F00FF, #b300ff);
            box-shadow: 0 10px 30px rgba(143, 0, 255, 0.3);
            color: #fff;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .app-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s;
        }

        .app-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(143, 0, 255, 0.5);
        }

        .app-btn:hover::after {
            left: 100%;
        }

        .app-btn:active {
            transform: scale(0.98);
        }

        .app-btn.neon-green {
            background: #39ff14;
            box-shadow: 0 0 35px #39ff14;
            border-color: #39ff14;
            color: #000;
        }

        /*
         * Sections (10x Vibe Cards)
         * ------------------------------------------------------------------
         */
        .sections {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        .section-card {
            position: relative;
            padding: 30px;
            border-radius: 24px;
            background: rgba(15, 15, 20, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            overflow: hidden;
        }

        .section-card:hover {
            transform: translateY(-4px);
            border-color: rgba(143, 0, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(143, 0, 255, 0.15);
        }

        /* Číslování na pozadí (Decentní) */
        .section-number {
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            user-select: none;
        }

        .section-card img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(143, 0, 255, 0.3));
            flex-shrink: 0;
            margin-top: 5px;
        }

        .section-content {
            flex: 1;
            padding-right: 20px;
        }

        .section-content h3 {
            margin: 0 0 12px 0;
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .purple { color: #8F00FF; }
        .white { color: #ffffff; }

        .section-content p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        /* Stejná decentní šipka pro vstup do sekce (rotovaná vpravo) */
        .section-arrow {
            position: absolute;
            right: 24px;
            bottom: 24px;
            width: 12px;
            height: 12px;
            border-top: 2px solid #39ff14;
            border-right: 2px solid #39ff14;
            transform: rotate(45deg);
            filter: drop-shadow(0 0 4px #39ff14);
            transition: all 0.3s ease;
        }

        .section-card:hover .section-arrow {
            transform: rotate(45deg) translate(4px, -4px);
        }

        /*
         * Footer Links & Copyright
         * ------------------------------------------------------------------
         */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 80px 20px 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .footer-links a {
            text-decoration: none;
            font-size: 0.80rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

        /* Barevné schéma patičky */
        .contact { color: #39ff14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .legal { color: #ff2a2a; text-shadow: 0 0 10px rgba(255, 42, 42, 0.3); }

        .copyright {
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.4;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .title { font-size: 2.6rem; }
            .section-card { flex-direction: column; gap: 16px; padding: 24px; }
            .section-card img { width: 45px; height: 45px; }
            .section-number { font-size: 4rem; right: 10px; top: -5px; }
            .footer-links { flex-direction: column; align-items: center; gap: 20px; }
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="grid"></div>

    <svg class="ekg-container" viewBox="0 0 1000 200" preserveAspectRatio="none">
        <path class="ekg-line" d="M -10 100 L 350 100 C 360 100, 365 90, 375 90 C 385 90, 390 100, 400 100 L 420 100 L 435 120 L 460 20 L 485 150 L 505 100 L 530 100 C 545 100, 555 80, 575 80 C 595 80, 605 100, 620 100 L 1010 100" />
    </svg>

    <div class="top-bar">
        <div class="back-arrow" onclick="goBack()"></div>
        <div class="logo-wrapper">
            <img src="fuegoblade-logo.png" alt="FuegoBlade">
        </div>
    </div>

    <div class="header">
        <div class="title">PulseMind™</div>
        <button class="app-btn" id="appBtn" onclick="goApp()">VSTOUPIT DO APP PULSEMIND™</button>
    </div>

    <div class="sections" id="sections"></div>

    <div class="footer-links">
        <a href="kontakt.html" class="contact" id="link-contact">KONTAKT</a>
        <a href="terms.html" class="legal" id="link-terms">VŠEOBECNÉ OBCHODNÍ PODMÍNKY</a>
        <a href="policy.html" class="legal" id="link-privacy">OCHRANA OSOBNÍCH ÚDAJŮ</a>
        <a href="copy.html" class="legal" id="link-copy">AUTORSKÁ PRÁVA</a>
    </div>

    <div class="copyright">
        © 2026 FuegoBlade™. Všechna práva vyhrazena.
    </div>

    <script>
        // Databáze překladů pro ovládací prvky
        const uiTranslations = {
            cs: {
                appBtn: "VSTOUPIT DO APP PULSEMIND™",
                contact: "KONTAKT",
                terms: "VŠEOBECNÉ OBCHODNÍ PODMÍNKY",
                privacy: "OCHRANA OSOBNÍCH ÚDAJŮ",
                copy: "AUTORSKÁ PRÁVA"
            },
            en: {
                appBtn: "ENTER APP PULSEMIND™",
                contact: "CONTACT",
                terms: "TERMS OF SERVICE",
                privacy: "PRIVACY POLICY",
                copy: "COPYRIGHT"
            },
            de: {
                appBtn: "PULSEMIND™ APP ÖFFNEN",
                contact: "KONTAKT",
                terms: "ALLGEMEINE GESCHÄFTSBEDINGUNGEN",
                privacy: "DATENSCHUTZRICHTLINIE",
                copy: "URHEBERRECHTE"
            },
            es: {
                appBtn: "ENTRAR A LA APP PULSEMIND™",
                contact: "CONTACTO",
                terms: "TÉRMINOS DE SERVICIO",
                privacy: "POLÍTICA DE PRIVACIDAD",
                copy: "DERECHOS DE AUTOR"
            }
        };

        // Databáze 10ti sekcí (Aktuálně připraveno pro CS, další lze snadno přidat)
        const sectionsData = {
            cs: [
                ["PulseMind™", "Tvůj Digitální Biologický Avatar", "Zapomeň na univerzální šablony a obecné fitness rady. Tvoje biologie je unikátní kód. PulseMind™ je první AI systém, který ho dokáže přečíst, pochopit a optimalizovat v reálném čase. Převezmi absolutní kontrolu nad svým tělem i výkonem.", "sekce-pulsemind.html"],
                ["Kognitivní Jádro", "Umělá Inteligence bez kompromisů", "Pod kapotou PulseMind™ tepe to nejpokročilejší z moderních neuronových sítí. Není to jen kód, je to tvůj osobní tým elitních vědců a trenérů, který nikdy nespí a učí se z každého tvého úderu srdce.", "sekce-ai.html"],
                ["Gravidita", "Ultimátní Biologická Transformace", "Těhotenství není nemoc, je to ten nejkomplexnější metabolický proces tvého života. PulseMind™ se adaptuje na tvé měnící se tělo v reálném čase. Hlídá tvou energii, spánek i nervový systém, abys tuto transformaci zvládla v plné síle a absolutní rovnováze.", "sekce-gravidite.html"],
                ["Adaptivní Rekalibrace", "Inteligentní návrat k výkonu", "Zranění není konec, je to jen nová proměnná v tvém kódu. PulseMind™ dynamicky překalibruje tvou strategii tak, abys chránil svá slabá místa, urychlil hojení a nepřišel o svůj těžce vybudovaný základ. Přeměň omezení ve svou taktickou výhodu.", "sekce-invalid.html"],
                ["Metabolická Architektura", "Palivo bez dohadů", "Jídlo nejsou jen prázdné kalorie, je to informační kód, který programuje tvé tělo. PulseMind™ neuznává univerzální diety. Vypočítá tvou přesnou biologickou rovnici a navrhne stravu i suplementaci tak, abys maximalizoval výkon a zkrátil regeneraci na minimum.", "sekce-eat.html"],
                ["Elitní Výkon", "Architektura Profesionálů", "Ve světě, kde o vítězství rozhodují zlomky procent, už nestačí jen tvrdě dřít. PulseMind™ ti dává do rukou analytickou převahu světových šampionů. Eliminuj dohady, vylaď svůj motor na absolutní maximum a posouvej hranice lidského potenciálu s chladnou přesností.", "sekce-professional.html"],
                ["Longevity Protokol", "Architektura Aktivního Věku", "Věk je pouhý datový bod, nikoliv tvůj limit. PulseMind™ přepisuje tradiční pravidla stárnutí a mění je v exaktně řízený proces aktivní dlouhověkosti. Udrž si ostrou mysl, silné tělo a absolutní svobodu pohybu díky personalizované biologické strategii.", "sekce-senior.html"],
                ["Architektura Růstu", "Inteligentní základ pro budoucnost", "Dětské tělo není zmenšenina dospělého, je to systém v neustálém, dynamickém vývoji. PulseMind™ pomáhá rodičům pochopit přirozené biologické rytmy svých dětí. Bez tlaku na výkon chráníme regeneraci, podporujeme vývoj mozku a budujeme zdravé návyky už od samého začátku.", "sekce-child.html"],
                ["Architektura Klidu", "Exaktně řízená regenerace", "Odpočinek není slabost, je to tvá nejmocnější taktická zbraň. PulseMind™ mění pasivní lenošení na vědecky řízený proces buněčné obnovy. Nauč se vědomě přepínat svůj nervový systém, snižovat kortizol a nabíjet baterie s maximální možnou efektivitou.", "sekce-relax.html"],
                ["Architektura Energie", "Inteligentní obnova mateřské síly", "Mateřství je extrémní biologický výkon, který vyžaduje tu nejchytřejší možnou strategii. PulseMind™ tě nenutí k vyčerpávajícím tréninkům na úkor spánku. Analyzuje tvůj deficit, optimalizuje tvou regeneraci a pomáhá ti budovat nezdolnou energii pro tebe i tvé dítě.", "sekce-mother.html"]
            ]
        };

        const defaultLang = 'cs';

        function loadContent() {
            // Získání jazyka z LocalStorage (nastaveno na index.html)
            let lang = localStorage.getItem("language") || defaultLang;
            
            // Pojistka, pokud by daný jazyk ještě neměl přeložené texty sekcí, použije se CS
            let activeSections = sectionsData[lang] ? sectionsData[lang] : sectionsData[defaultLang];
            let activeUI = uiTranslations[lang] ? uiTranslations[lang] : uiTranslations[defaultLang];

            document.documentElement.lang = lang;
            
            // Propis textů UI
            document.getElementById("appBtn").innerText = activeUI.appBtn;
            document.getElementById("link-contact").innerText = activeUI.contact;
            document.getElementById("link-terms").innerText = activeUI.terms;
            document.getElementById("link-privacy").innerText = activeUI.privacy;
            document.getElementById("link-copy").innerText = activeUI.copy;

            // Vygenerování 10 sekcí
            const container = document.getElementById("sections");
            container.innerHTML = ""; // Vyčištění pro jistotu

            activeSections.forEach((sec, index) => {
                // Formátování čísla s nulou na začátku (01, 02...)
                let numStr = (index + 1).toString().padStart(2, '0');

                let div = document.createElement("div");
                div.className = "section-card";
                div.onclick = () => window.location.href = sec[3];
                
                div.innerHTML = `
                    <div class="section-number">${numStr}</div>
                    <img src="pulsemind-logo.png" alt="PulseMind Logo">
                    <div class="section-content">
                        <h3><span class="purple">${sec[0]}:</span> <span class="white">${sec[1]}</span></h3>
                        <p>${sec[2]}</p>
                    </div>
                    <div class="section-arrow"></div>
                `;
                container.appendChild(div);
            });
        }

        // Tlačítko zpět na úvodku
        function goBack() {
            let lang = localStorage.getItem("language") || defaultLang;
            window.location.href = `index.html?lang=${lang}`;
        }

        // Tlačítko vstup do aplikace s efektem zmáčknutí
        function goApp() {
            const btn = document.getElementById('appBtn');
            btn.classList.add('neon-green');
            
            setTimeout(() => {
                window.location.href = "https://app.fuegoblade.com";
            }, 800);
        }

        window.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
