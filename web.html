         */

        }

            position: fixed;
            inset: 0;
            background-image:

              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
            opacity: 0.8;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /*
         * ⚡ EKG Pulse (Neon Green)
         * ------------------------------------------------------------------
         */
        .ekg-container {
            position: absolute;
            top: 100px;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
            pointer-events: none;
        }

        .ekg-line {
            fill: none;
            stroke: #39ff14;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px #39ff14) drop-shadow(0 0 12px #39ff14) drop-shadow(0 0 25px #39ff14);
            stroke-dasharray: 300 1500;
            animation: ekgPulse 2.4s linear infinite;
        }

        @keyframes ekgPulse {
            0% { stroke-dashoffset: 1800; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /*
         * Top Bar (Arrow & Logo)
         * ------------------------------------------------------------------
         */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

            width: 14px;
            height: 14px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 4px #39ff14);
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);

        const defaultLang = 'cs';

        function loadContent() {
            let lang = localStorage.getItem("language") || defaultLang;
            
            let activeSections = sectionsData[lang] ? sectionsData[lang] : sectionsData[defaultLang];
            let activeUI = uiTranslations[lang] ? uiTranslations[lang] : uiTranslations[defaultLang];

            document.documentElement.lang = lang;
            
            document.getElementById("appBtn").innerText = activeUI.appBtn;
            document.getElementById("link-impressum").innerText = activeUI.impressum;
            document.getElementById("link-terms").innerText = activeUI.terms;
            document.getElementById("link-privacy").innerText = activeUI.privacy;
            document.getElementById("link-copyright").innerText = activeUI.copyright;
            document.getElementById("copy-text").innerText = activeUI.copy;

            const container = document.getElementById("sections");
            container.innerHTML = "";

            activeSections.forEach((sec, index) => {
                let numStr = (index + 1).toString().padStart(2, '0');

                let div = document.createElement("div");
                div.className = "section-card";
                div.onclick = () => window.location.href = sec[3];
                
                div.innerHTML = `
                    <div class="section-number">${numStr}</div>
                    <img src="pulsemind-logo.png" alt="PulseMind Logo">
                    <div class="section-content">
                        <h3><span class="purple">${sec[0]}:</span> <span class="white">${sec[1]}</span></h3>
                        <p>${sec[2]}</p>
                    </div>
                    <div class="section-arrow"></div>
                `;
                container.appendChild(div);
            });
        }

        function goBack() {
            let lang = localStorage.getItem("language") || defaultLang;
            window.location.href = `index.html?lang=${lang}`;
        }

        function goApp() {
            const btn = document.getElementById('appBtn');
            btn.classList.add('neon-green');
            
            setTimeout(() => {
                window.location.href = "https://app.fuegoblade.com";
            }, 800);
        }

        window.addEventListener('DOMContentLoaded', loadContent);
