    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143,0,255,0.1) 0%, #000 80%);
            z-index: -2;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* Back Arrow */
        .back-arrow {
            width: 16px;
            height: 16px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 6px #39ff14);
            transition: 0.3s;
        }
        
        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 10px #39ff14);
        }

        /* Sound Toggle Button */
        .sound-toggle {
            cursor: pointer;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            color: #39ff14;
            filter: drop-shadow(0 0 5px rgba(57, 255, 20, 0.5));
        }

        .sound-toggle.active {
            color: #39ff14;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .sound-toggle svg {
            width: 100%;
            height: 100%;
        }

        /* Image Section */
        .hero-image {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image img {
            width: 80%;
            max-width: 600px;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(143,0,255,0.15);
        }

        .hero-image::after {
            content: "";
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* Code Window */
        .code-window {
            max-width: 900px;
            margin: 40px auto 80px;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(143,0,255,0.3);
            box-shadow: 0 0 40px rgba(143,0,255,0.15), inset 0 0 20px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
        }

        .code-header {
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .purple { color: #8F00FF; text-shadow: 0 0 10px rgba(143,0,255,0.5); }
        .white { color: #ffffff; }

        .code-content {
            white-space: pre-wrap;
            display: inline; /* To align correctly with the cursor */
        }

        /* Třídy pro formátování psaného textu */
        .text-boot { color: #39ff14; font-weight: bold; opacity: 0.8; }
        .text-body { color: #d1d1d1; font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; }
        .text-summary { color: #00e5ff; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; display: block; margin-top: 20px; border-left: 3px solid #00e5ff; padding-left: 15px; }

        /* Neonový obdélníkový kurzor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.1em;
            background: #39ff14;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #39ff14;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin: 40px 0 40px;
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .code-window { padding: 25px; margin: 20px; font-size: 0.95rem; }
            .code-header { font-size: 1.1rem; }
            .text-body, .text-summary { font-size: 1rem; }
        }
    </style>
</head>

                copyright: "© 2026 FuegoBlade™. Všechna práva vyhrazena."

                summaryTitle: ">>> PROTOCOL SUMMARY <<<\n",
                summary: "Knowing how to rest correctly and deeply is the biggest competitive advantage today. With PulseMind™, you will permanently get rid of the guilt of inactivity, because hard data will show you in black and white that your body is doing the most crucial work right now. Regain your inner balance and prepare your machine for the next day.",
                copyright: "© 2026 FuegoBlade™. All rights reserved."
            },
            de: {
                title1: "Architektur der Ruhe:",

                boot: "> INITIALISIERUNG DES PARASYMPATHIKUS...\n> ANALYSE DER TIEFENREGENERATION...\n> ZUGRIFF GEWÄHRT.\n\n",
                body: "In der heutigen hyper-schnellen Welt ist die härteste Disziplin nicht, härter zu trainieren, sondern im richtigen Moment wirklich abschalten zu können. Das übliche Verständnis von Entspannung gleitet oft in passives Prokrastinieren oder das Starren auf Bildschirme ab, was deinen Körper und dein Gehirn nicht wirklich erneuert. PulseMind™ nähert sich der Ruhe als einem hochaktiven, exakt messbaren biologischen Prozess.\n\nAus den Daten deiner Smart-Geräte liest die künstliche Intelligenz genau ab, wann dein Nervensystem in einem ständigen Stressmodus blockiert ist und dein Sympathikus auf Hochtouren läuft. Sobald die KI einen Abfall der Herzfrequenzvariabilität (HRV), eine verschlechterte Schlafarchitektur oder einen erhöhten Ruhepuls feststellt, greift sie sofort ein.\n\nAnstelle von weiterem Leistungsdruck verschreibt sie dir ein gezieltes Rettungsprotokoll zur Aktivierung des Parasympathikus – dem 'Rest and Digest'-Modus. Das können spezifische Atemfrequenzen zur sofortigen Senkung des Cortisols sein, ein leichter Morgen-Flow zur Lösung tiefer faszialer Verspannungen oder die datengestützte Empfehlung, Zeit in absoluter Stille zu verbringen.\n\nDas System versteht, dass deine wahre Kraft und mentale Schärfe ausschließlich in Momenten entstehen, in denen der Körper einen sicheren Raum zur Gewebereparatur erhält. Dank PulseMind™ bekommt Ruhe eine klare Logik und wird zu einem ebenso wichtigen, wenn nicht sogar wichtigeren Teil deiner Lebensstrategie als die anspruchsvollste körperliche Leistung.\n\n",
                summaryTitle: ">>> PROTOKOLLZUSAMMENFASSUNG <<<\n",
                summary: "Zu wissen, wie man richtig und tief ruht, ist heute der größte Wettbewerbsvorteil. Mit PulseMind™ wirst du das Schuldgefühl der Inaktivität endgültig los, denn harte Daten zeigen dir schwarz auf weiß, dass dein Körper gerade die allerwichtigste Arbeit leistet. Gewinne deine innere Balance zurück und bereite deine Maschine auf den nächsten Tag vor.",
                copyright: "© 2026 FuegoBlade™. Alle Rechte vorbehalten."
            },
            es: {

                summaryTitle: ">>> RESUMEN DEL PROTOCOLO <<<\n",
                summary: "Saber cómo descansar correcta y profundamente es la mayor ventaja competitiva de hoy. Con PulseMind™, te desharás definitivamente de la culpa por la inactividad, porque los datos concretos te mostrarán en blanco y negro que tu cuerpo está haciendo el trabajo más crucial en este momento. Recupera tu equilibrio interior y prepara tu máquina para el día siguiente.",
                copyright: "© 2026 FuegoBlade™. Todos los derechos reservados."
            }
        };

        const lang = localStorage.getItem("language") || "cs";
        const currentData = langData[lang] || langData["cs"];
        
        document.documentElement.lang = lang;
        document.getElementById("copyright-text").innerText = currentData.copyright;
        
        document.getElementById("section-title").innerHTML = `
            <span class="purple">${currentData.title1}</span> 
            <span class="white">${currentData.title2}</span>
        `;

        const contentBlocks = [
            { text: currentData.boot, cssClass: "text-boot" },
            { text: currentData.body, cssClass: "text-body" },
            { text: currentData.summaryTitle + currentData.summary, cssClass: "text-summary" }
        ];

        let blockIndex = 0;
        let charIndex = 0;
        const container = document.getElementById("typedText");
        let currentSpan = null;
        const typeSpeed = 15; 

        // --- AUDIO SYSTÉM PRO PÍPÁNÍ A TLAČÍTKO ---
        let audioCtx;
        let isSoundEnabled = false;

        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById("soundToggle");

            if (isSoundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                `;
            }
        }

        function playBeep() {
            if (!audioCtx || audioCtx.state === 'suspended' || !isSoundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch (e) {}
        }

        // --- EFEKT PSANÍ KÓDU ---
        function typeWriter() {
            if (blockIndex < contentBlocks.length) {
                if (charIndex === 0) {
                    currentSpan = document.createElement("span");
                    currentSpan.className = contentBlocks[blockIndex].cssClass;
                    container.appendChild(currentSpan);
                }
                
                let char = contentBlocks[blockIndex].text.charAt(charIndex);
                
                if (char === '\n') {
                    currentSpan.innerHTML += '<br>';
                } else {
                    currentSpan.innerHTML += char;
                }
                
                if (char !== ' ' && char !== '\n' && Math.random() > 0.6) {
                    playBeep();
                }

                charIndex++;
                
                if (charIndex >= contentBlocks[blockIndex].text.length) {
                    blockIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500);
                } else {
                    setTimeout(typeWriter, typeSpeed);
                }
            }
        }

        function goBack() {
            window.location.href = "web.html";
        }

        window.onload = () => {
            setTimeout(typeWriter, 400); 
        };
    </script>
