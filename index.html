<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PulseMind™ — Welcome</title>

    <meta name="description" content="PulseMind™ — Your Digital Biological Avatar. A new way to understand your inner world." />

    <!-- Canonical -->
    <link rel="canonical" href="https://fuegoblade.com/">

    <!-- Favicon + Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- OpenGraph -->
    <meta property="og:title" content="PulseMind™">
    <meta property="og:description" content="Your Digital Biological Avatar.">
    <meta property="og:image" content="og-pulsemind.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fuegoblade.com">

    <!-- Twitter OG -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PulseMind™">
    <meta name="twitter:description" content="Your Digital Biological Avatar.">
    <meta name="twitter:image" content="og-pulsemind.jpg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* ----- Jazyková tlačítka ----- */
        .lang-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s ease;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ----- Layout ----- */
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            text-align: center;
        }

        /* ----- Logo / Srdce ----- */
        .heart-img {
            width: 260px;
            animation: pulse 2.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.12); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* ----- PulseMind text ----- */
        .title {
            margin-top: 25px;
            font-size: 44px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ----- Continue button ----- */
        .continue-btn {
            margin-top: 40px;
            padding: 18px 50px;
            font-size: 22px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            background: #b300ff; /* silná neonová fialová */
            box-shadow: 0 0 20px #b300ff;
            color: white;
            font-weight: bold;
            transition: 0.25s;
        }

        .continue-btn:hover {
            background: #c733ff;
            box-shadow: 0 0 28px #c733ff;
        }

        .continue-btn:active {
            background: #39ff14; /* neonová zelená */
            box-shadow: 0 0 20px #39ff14;
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <!-- Jazykové tlačítka -->
    <div class="lang-buttons">
        <div class="lang-btn" onclick="setLang('cs')">🇨🇿</div>
        <div class="lang-btn" onclick="setLang('en')">🇬🇧</div>
        <div class="lang-btn" onclick="setLang('de')">🇩🇪</div>
        <div class="lang-btn" onclick="setLang('es')">🇪🇸</div>
    </div>

    <!-- Hlavní obsah -->
    <div class="center-content">
        <img src="pulsemind-logo.png" class="heart-img" alt="PulseMind Heart">

        <div class="title">PulseMind™</div>

        <button class="continue-btn" onclick="goNext()">CONTINUE</button>
    </div>

    <script>
        const translations = {
            cs: { continue: "POKRAČOVAT" },
            en: { continue: "CONTINUE" },
            de: { continue: "WEITER" },
            es: { continue: "CONTINUAR" }
        };

        const defaultLang = "en";

        function loadLanguage() {
            let lang = localStorage.getItem("language");
            if (!lang) {
                lang = defaultLang;
                localStorage.setItem("language", lang);
            }
            document.getElementById("continue-btn").innerText = translations[lang].continue;
            document.documentElement.lang = lang;
        }

        function setLang(lang) {
            localStorage.setItem("language", lang);
            loadLanguage();
        }

        function goNext() {
        const lang = localStorage.getItem("language")     || defaultLang;

        setTimeout(() => {
            window.location.href = `web.html?lang=$    {lang}`;
        }, 500);
    }

        window.onload = loadLanguage;
    </script>
</body>
</html>
