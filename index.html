<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PulseMind™ / Welcome</title>

    <meta name="description" content="PulseMind™ — Your Digital Biological Avatar. A new way to understand your inner world." />

    <!-- Canonical -->
    <link rel="canonical" href="https://fuegoblade.com/">

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- OpenGraph -->
    <meta property="og:title" content="PulseMind™">
    <meta property="og:description" content="Your Digital Biological Avatar.">
    <meta property="og:image" content="og-pulsemind.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fuegoblade.com">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ---------- Language switcher ---------- */
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .main-lang {
            width: 36px;
            cursor: pointer;
            transition: 0.2s;
        }

        .main-lang:hover {
            transform: scale(1.1);
        }

        .dropdown {
            margin-top: 8px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #9f4bff;
            box-shadow: 0 0 12px #9f4bff;
            border-radius: 10px;
            padding: 10px;
            display: none;
            position: absolute;
            right: 0;
            z-index: 999;
        }

        .dropdown img {
            width: 32px;
            cursor: pointer;
            padding: 5px 0;
            transition: 0.2s;
            display: block;
        }

        .dropdown img:hover {
            transform: scale(1.1);
            filter: brightness(1.3);
        }

        /* ---------- Center content ---------- */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            text-align: center;
            width: 90%;
            max-width: 650px;
        }

        .heart-img {
            width: 330px; /* větší logo */
            animation: pulse 2.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.16); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* PulseMind text styl podle tvého kódu */
        .title {
            font-size: 62px;
            font-weight: 900;
            margin-top: 10px;
            background: linear-gradient(to bottom right, white, #d9b3ff, white);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(143,0,255,0.6);
            letter-spacing: -1px;
        }

        /* ---------- Continue button ---------- */
        .continue-btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 60px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            color: black; /* změna z bílé */
            background: #b300ff; /* neon fialová */
            box-shadow: 0 0 20px #b300ff;
            transition: 0.3s;
        }

        .continue-btn:hover {
            background: #d05aff;
            box-shadow: 0 0 30px #d05aff;
        }

        .continue-btn:active {
            background: #39ff14; /* neon green */
            box-shadow: 0 0 25px #39ff14;
            transform: translateX(-50%) scale(0.96);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .heart-img { width: 240px; }
            .title { font-size: 48px; }
            .continue-btn { font-size: 18px; padding: 15px 45px; bottom: 40px; }
        }
    </style>
</head>

<body>

    <!-- Language selector -->
    <div class="lang-container">
        <img src="flag-en.png" id="current-flag" class="main-lang" onclick="toggleDropdown()">

        <div class="dropdown" id="dropdown">
            <img src="flag-en.png" onclick="setLang('en', this)">
            <img src="flag-cs.png" onclick="setLang('cs', this)">
            <img src="flag-de.png" onclick="setLang('de', this)">
            <img src="flag-es.png" onclick="setLang('es', this)">
        </div>
    </div>

    <!-- Hlavní obsah -->
    <div class="center">
        <img src="pulsemind-logo.png" class="heart-img" alt="PulseMind Heart">

        <div class="title">PulseMind™</div>
    </div>

    <!-- Continue button -->
    <button class="continue-btn" id="continue-btn" onclick="goNext()">CONTINUE</button>

    <script>
        const translations = {
            cs: { continue: "POKRAČOVAT" },
            en: { continue: "CONTINUE" },
            de: { continue: "WEITER" },
            es: { continue: "CONTINUAR" }
        };

        const flags = {
            cs: "flag-cs.png",
            en: "flag-en.png",
            de: "flag-de.png",
            es: "flag-es.png"
        };

        const defaultLang = "en";

        function toggleDropdown() {
            const menu = document.getElementById("dropdown");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        }

        function setLang(lang, imgElement) {
            localStorage.setItem("language", lang);

            // nastav hlavní vlajku
            document.getElementById("current-flag").src = flags[lang];

            // přepni text
            document.getElementById("continue-btn").innerText = translations[lang].continue;

            // zavři dropdown
            document.getElementById("dropdown").style.display = "none";

            // nastav lang atribut
            document.documentElement.lang = lang;
        }

        function loadLanguage() {
            let lang = localStorage.getItem("language") || defaultLang;
            document.getElementById("current-flag").src = flags[lang];
            document.getElementById("continue-btn").innerText = translations[lang].continue;
        }

        function goNext() {
            const lang = localStorage.getItem("language") || defaultLang;

            setTimeout(() => {
                window.location.href = `web.html?lang=${lang}`;
            }, 600);
        }

        window.onload = loadLanguage;
    </script>

</body>
</html>
