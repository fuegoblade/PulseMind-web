    <style>
        /*
         * App Basics & No-Scroll
         * ------------------------------------------------------------------
         */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            /* Jednotný systémový font pro celou appku */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            overflow: hidden; /* Zabrání jakémukoliv rolování */
            height: 100vh;
            height: 100dvh; /* Pro moderní mobilní prohlížeče */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /*
         * Cyber Background
         * ------------------------------------------------------------------
         */
        .bg-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-cyber-grid {
            position: absolute;
            inset: 0;
            background-image: 
              linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            opacity: 0.8;
        }

        .bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143, 0, 255, 0.1) 0%, #000 80%);
            z-index: 2;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        /*
         * ⚡ EKG Pulse (Nahradilo žubrienku) - BARVA ZMĚNĚNA NA NEON ZELENOU
         * ------------------------------------------------------------------
         */
        .ekg-container {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 200px;
            /* Precizní vycentrování za srdeční logo */
            transform: translateY(calc(-50% - 12vh - 40px));
            z-index: 3;
            pointer-events: none;
        }

        .ekg-line {
            fill: none;
            stroke: #39ff14; /* ZMĚNĚNO NA NEONOVĚ ZELENOU (Barva tlačítka) */
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            /* Zářící laserový efekt (Zelené jádro, silná zelená záře) */
            filter: drop-shadow(0 0 4px #39ff14) drop-shadow(0 0 12px #39ff14) drop-shadow(0 0 25px #39ff14);
            /* Délka laseru 300, mezera 1500 */
            stroke-dasharray: 300 1500;
            animation: ekgPulse 2.4s linear infinite;
        }

        @keyframes ekgPulse {
            0% { stroke-dashoffset: 1800; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /*
         * Language Switcher (Vertical Pill Style)
         * ------------------------------------------------------------------
         */
        .lang-switcher {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 20, 25, 0.7); /* Tmavší sklo */
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px; /* Vytvoří krásnou pilulku */
            padding: 4px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
        }

        .main-flag {
            cursor: pointer;
            font-size: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            transition: background 0.3s;
        }

        .main-flag:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .lang-menu {
            display: none;
            flex-direction: column;
            padding: 0;
            gap: 4px;
            margin-top: 4px; /* Drobná mezera mezi hlavní a první možností */
            animation: fadeIn 0.2s ease-out;
        }

        .lang-menu.show {
            display: flex;
        }

        .lang-option {
            font-size: 24px;
            cursor: pointer;
            width: 44px; /* Stejná velikost jako main-flag pro perfektní linii */
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .lang-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /*
         * Center Content (Logo & Title)
         * ------------------------------------------------------------------
         */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10; 
            margin-top: -12vh;
            text-align: center;
        }

        .logo-container {
            position: relative;
            margin-bottom: 8px;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: #8F00FF;
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.3; 
            animation: pulse-glow 3s infinite;
        }

        .heart-img {
            position: relative;
            width: 110px;
            height: auto;
            animation: heartbeat 2.4s infinite ease-in-out;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(143, 0, 255, 0.3));
            mix-blend-mode: screen; 
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.2; filter: blur(35px); }
            50% { opacity: 0.4; filter: blur(45px); }
        }

        /*
         * Title 
         * ------------------------------------------------------------------
         */
        .title {
            font-size: 3.2rem;
            font-weight: 900; 
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 0%, #d3b1ff 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(143, 0, 255, 0.3);
            margin-bottom: 2px;
        }

        .tagline {
            color: #8F00FF;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /*
         * Bottom Button Area
         * ------------------------------------------------------------------
         */
        .bottom-container {
            position: absolute;
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            padding: 0 24px;
            max-width: 400px;
            z-index: 10;
            display: flex;
            justify-content: center;
        }

        .continue-btn {
            width: 100%;
            padding: 18px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 900; 
            letter-spacing: 0.25em; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            background: linear-gradient(90deg, #8F00FF, #b300ff);
            box-shadow: 0 10px 30px rgba(143, 0, 255, 0.3);
            color: #fff;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .continue-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s;
        }

        .continue-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(143, 0, 255, 0.5);
        }

        .continue-btn:hover::after {
            left: 100%;
        }

        .continue-btn:active {
            transform: scale(0.98);
        }

        /* Neonová zelená barva při zmáčknutí (zachováno) */
        .continue-btn.neon-green {
            background: #39ff14;
            box-shadow: 0 0 35px #39ff14;
            border-color: #39ff14;
            color: #000;
        }

        @media (max-width: 380px) {
            .title { font-size: 2.6rem; }
            .heart-img { width: 90px; }
            .continue-btn { padding: 16px; font-size: 14px; }
        }
    </style>

    <script>

</head>

<body>
    <div class="bg-container">
        <div class="bg-cyber-grid"></div>
        <div class="bg-glow"></div>
        
        <svg class="ekg-container" viewBox="0 0 1000 200" preserveAspectRatio="none">
            <path class="ekg-line" d="M -10 100 L 350 100 C 360 100, 365 90, 375 90 C 385 90, 390 100, 400 100 L 420 100 L 435 120 L 460 20 L 485 150 L 505 100 L 530 100 C 545 100, 555 80, 575 80 C 595 80, 605 100, 620 100 L 1010 100" />
        </svg>
    </div>

    <div class="lang-switcher">
        <div class="main-flag" id="main-flag" onclick="toggleLangMenu()">🇬🇧</div>
        <div class="lang-menu" id="lang-menu">
            <div class="lang-option" data-lang="cs" onclick="selectLang('cs')">🇨🇿</div>
            <div class="lang-option" data-lang="en" onclick="selectLang('en')">🇬🇧</div>
            <div class="lang-option" data-lang="de" onclick="selectLang('de')">🇩🇪</div>
            <div class="lang-option" data-lang="es" onclick="selectLang('es')">🇪🇸</div>
        </div>
    </div>

    <div class="center-content">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="pulsemind-logo.png" class="heart-img" alt="PulseMind Heart" />
        </div>
        <div class="title">PulseMind™ Web</div>
        <div class="tagline" id="tagline">Your Digital Biological Avatar</div>
    </div>

    <div class="bottom-container">
        <button class="continue-btn" id="continue-btn" onclick="goNext()">CONTINUE</button>
    </div>

    <script>
        const translations = {
            cs: {
                continue: "POKRAČOVAT",
                tagline: "Váš digitální biologický avatar"
            },
            en: {
                continue: "CONTINUE",
                tagline: "Your Digital Biological Avatar"
            },
            de: {
                continue: "WEITER",
                tagline: "Ihr digitaler biologischer Avatar"
            },
            es: {
                continue: "CONTINUAR",
                tagline: "Tu avatar biológico digital"
            }
        };

        const flagMap = {
            cs: '🇨🇿',
            en: '🇬🇧',
            de: '🇩🇪',
            es: '🇪🇸'
        };

        const defaultLang = 'en';

        // Inicializace jazyka
        function loadLanguage() {
            let lang = localStorage.getItem('language');
            if (!lang || !translations[lang]) {
                lang = defaultLang;
                localStorage.setItem('language', lang);
            }
            document.documentElement.lang = lang;
            
            // Texty
            document.getElementById('continue-btn').innerText = translations[lang].continue;
            document.getElementById('tagline').innerText = translations[lang].tagline;
            
            // Nastavení hlavní vlajky nahoře
            document.getElementById('main-flag').innerText = flagMap[lang];

            // Skrytí aktuálně vybrané vlajky z rozbalovacího menu
            document.querySelectorAll('.lang-option').forEach(option => {
                if (option.getAttribute('data-lang') === lang) {
                    option.style.display = 'none'; // Vybraná vlajka zmizí z menu
                } else {
                    option.style.display = 'flex'; // Ostatní zůstanou
                }
            });
        }

        // Zobrazení/Skrytí menu
        function toggleLangMenu() {
            document.getElementById('lang-menu').classList.toggle('show');
        }

        // Výběr jazyka z menu
        function selectLang(lang) {
            localStorage.setItem('language', lang);
            loadLanguage();
            document.getElementById('lang-menu').classList.remove('show');
        }

        // Zavření menu při kliknutí jinam
        document.addEventListener('click', (event) => {
            const menu = document.getElementById('lang-menu');
            const flag = document.getElementById('main-flag');
            if (!menu.contains(event.target) && event.target !== flag) {
                menu.classList.remove('show');
            }
        });

        // Tlačítko pokračovat
        function goNext() {
            const btn = document.getElementById('continue-btn');
            const lang = localStorage.getItem('language') || defaultLang;
            
            btn.classList.add('neon-green');
            
            setTimeout(() => {
                window.location.href = `web.html?lang=${lang}`;
            }, 1000); 
        }

        window.addEventListener('DOMContentLoaded', loadLanguage);
    </script>
</body>
