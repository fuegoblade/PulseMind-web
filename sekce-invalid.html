<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protokol 04 | PulseMind™</title>

    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive">
    <meta name="google" content="nositelinkssearchbox">

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143,0,255,0.1) 0%, #000 80%);
            z-index: -2;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* Back Arrow */
        .back-arrow {
            width: 16px;
            height: 16px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 6px #39ff14);
            transition: 0.3s;
        }
        
        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 10px #39ff14);
        }

        /* Sound Toggle Button */
        .sound-toggle {
            cursor: pointer;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            color: #39ff14;
            filter: drop-shadow(0 0 5px rgba(57, 255, 20, 0.5));
        }

        .sound-toggle.active {
            color: #39ff14;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .sound-toggle svg {
            width: 100%;
            height: 100%;
        }

        /* Image Section */
        .hero-image {
            margin-top: 80px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image img {
            width: 80%;
            max-width: 600px;
            height: auto;
            object-fit: contain;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 30px rgba(143,0,255,0.15);
        }

        .hero-image::after {
            content: "";
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* Code Window */
        .code-window {
            max-width: 900px;
            margin: 40px auto 80px;
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(143,0,255,0.3);
            box-shadow: 0 0 40px rgba(143,0,255,0.15), inset 0 0 20px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
        }

        .code-header {
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .purple { color: #8F00FF; text-shadow: 0 0 10px rgba(143,0,255,0.5); }
        .white { color: #ffffff; }

        .code-content {
            white-space: pre-wrap;
            display: inline; /* To align correctly with the cursor */
        }

        /* Třídy pro formátování psaného textu */
        .text-boot { color: #39ff14; font-weight: bold; opacity: 0.8; }
        .text-body { color: #d1d1d1; font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; }
        .text-summary { color: #00e5ff; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; display: block; margin-top: 20px; border-left: 3px solid #00e5ff; padding-left: 15px; }

        /* Neonový obdélníkový kurzor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.1em;
            background: #39ff14;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #39ff14;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin: 40px 0 40px;
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .code-window { padding: 25px; margin: 20px; font-size: 0.95rem; }
            .code-header { font-size: 1.1rem; }
            .text-body, .text-summary { font-size: 1rem; }
        }
    </style>
</head>

<body>

                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>

    </div>

            </div>

                summaryTitle: ">>> SHRNUTÍ PROTOKOLU <<<\n",
                summary: "Zranění už není slepá ulička. S PulseMind™ se i nucená rekonvalescence stává exaktně řízeným procesem plným dat a algoritmů. Efektivně ochráníš svá zranitelná místa, podpoříš buněčnou obnovu a udržíš si ostrý mindset i ve chvílích, kdy ti tvé vlastní tělo vystaví stopku.",
                copyright: "© 2026 FuegoBlade™. Všechna práva vyhrazena."
            },
            en: {
                title1: "Adaptive Recalibration:",
                title2: "Intelligent return to performance",
                boot: "> RESCUE PROTOCOL INITIALIZATION...\n> BIOMECHANICAL DEFICIT ANALYSIS...\n> ACCESS GRANTED.\n\n",
                body: "Physical limitation, pain, or an acute injury doesn't mean your progress has to grind to a halt. In traditional sports and fitness, an injury often sidelines you and condemns you to demotivating passive waiting. PulseMind™, however, views a biomechanical deficit simply as another crucial data layer in your overall physiological profile.\n\nOnce you define your current state or limitation to the system, the artificial intelligence instantly rewrites your existing training and recovery architecture. It completely diverts the load away from injured tissues and strategically redirects your physical and mental focus to areas you can safely and effectively develop in this phase.\n\nThe AI begins modulating your diet with maximum precision to support collagen production and suppress systemic inflammation, while through the analysis of your sleep and heart rhythm, it monitors whether your organism is focusing all its available energy into healing processes.\n\nYou won't just get dry advice to rest from PulseMind™. You will get a constantly evolving rescue protocol that safely guides you through the pitfalls of convalescence with millimeter precision, ensuring that you return to full load not only faster, but above all, smarter.\n\n",
                summaryTitle: ">>> PROTOCOL SUMMARY <<<\n",
                summary: "An injury is no longer a dead end. With PulseMind™, even forced convalescence becomes a precisely managed process full of data and algorithms. You will effectively protect your vulnerable spots, support cellular renewal, and maintain a sharp mindset even when your own body issues a stop sign.",
                copyright: "© 2026 FuegoBlade™. All rights reserved."
            },
            de: {
                title1: "Adaptive Rekalibrierung:",
                title2: "Intelligente Rückkehr zur Leistung",
                boot: "> INITIALISIERUNG DES RETTUNGSPROTOKOLLS...\n> ANALYSE DES BIOMECHANISCHEN DEFIZITS...\n> ZUGRIFF GEWÄHRT.\n\n",
                body: "Körperliche Einschränkung, Schmerz oder eine akute Verletzung bedeuten nicht, dass dein Fortschritt zum Stillstand kommen muss. Im traditionellen Sport und Fitness wirft dich eine Verletzung oft aus dem Spiel und verurteilt dich zu demotivierendem passivem Warten. PulseMind™ betrachtet ein biomechanisches Defizit jedoch lediglich als eine weitere wichtige Datenschicht in deinem gesamten physiologischen Profil.\n\nSobald du dem System deinen aktuellen Zustand oder deine Einschränkung definierst, schreibt die künstliche Intelligenz deine bisherige Trainings- und Regenerationsarchitektur blitzschnell um. Sie leitet die Belastung vollständig von verletzten Geweben ab und lenkt deinen physischen und mentalen Fokus strategisch auf Bereiche, die du in dieser Phase sicher und effektiv entwickeln kannst.\n\nDie KI beginnt, deine Ernährung mit höchster Präzision zu modulieren, um die Kollagenproduktion zu unterstützen und systemische Entzündungen zu unterdrücken, während sie durch die Analyse deines Schlafs und Herzrhythmus überwacht, ob dein Organismus seine gesamte verfügbare Energie auf Heilungsprozesse konzentriert.\n\nVon PulseMind™ bekommst du nicht nur den trockenen Rat, dich auszuruhen. Du erhältst ein sich ständig weiterentwickelndes Rettungsprotokoll, das dich mit millimetergenauer Präzision sicher durch die Tücken der Rekonvaleszenz führt und sicherstellt, dass du nicht nur schneller, sondern vor allem intelligenter zur vollen Belastung zurückkehrst.\n\n",
                summaryTitle: ">>> PROTOKOLLZUSAMMENFASSUNG <<<\n",
                summary: "Eine Verletzung ist keine Sackgasse mehr. Mit PulseMind™ wird auch die erzwungene Rekonvaleszenz zu einem exakt gesteuerten Prozess voller Daten und Algorithmen. Du schützt deine Schwachstellen effektiv, unterstützt die Zellerneuerung und behältst ein scharfes Mindset, selbst wenn dein eigener Körper ein Stoppschild aufstellt.",
                copyright: "© 2026 FuegoBlade™. Alle Rechte vorbehalten."
            },
            es: {
                title1: "Recalibración Adaptativa:",
                title2: "Retorno inteligente al rendimiento",
                boot: "> INICIALIZACIÓN DEL PROTOCOLO DE RESCATE...\n> ANÁLISIS DEL DÉFICIT BIOMECÁNICO...\n> ACCESO CONCEDIDO.\n\n",
                body: "La limitación física, el dolor o una lesión aguda no significan que tu progreso tenga que detenerse por completo. En el enfoque tradicional del deporte y el fitness, una lesión a menudo te deja fuera de juego y te condena a una espera pasiva y desmotivadora. Sin embargo, PulseMind™ ve un déficit biomecánico simplemente como otra capa de datos crucial en tu perfil fisiológico general.\n\nUna vez que defines tu estado actual o limitación al sistema, la inteligencia artificial reescribe instantáneamente tu arquitectura de entrenamiento y recuperación existente. Desvía por completo la carga de los tejidos lesionados y redirige estratégicamente tu enfoque físico y mental a áreas que puedes desarrollar de manera segura y efectiva en esta fase.\n\nLa IA comienza a modular tu dieta con la máxima precisión para apoyar la producción de colágeno y suprimir la inflamación sistémica, mientras que a través del análisis de tu sueño y ritmo cardíaco, monitorea si tu organismo está concentrando toda su energía disponible en los procesos de curación.\n\nNo recibirás solo un consejo seco de descansar de PulseMind™. Obtendrás un protocolo de rescate en constante evolución que te guiará de manera segura a través de los obstáculos de la convalecencia con precisión milimétrica, asegurando que regreses a la carga completa no solo más rápido, sino sobre todo, de manera más inteligente.\n\n",
                summaryTitle: ">>> RESUMEN DEL PROTOCOLO <<<\n",
                summary: "Una lesión ya no es un callejón sin salida. Con PulseMind™, incluso la convalecencia forzada se convierte en un proceso administrado con precisión, lleno de datos y algoritmos. Protegerás eficazmente tus puntos vulnerables, apoyarás la renovación celular y mantendrás una mentalidad aguda incluso cuando tu propio cuerpo te muestre una señal de alto.",
                copyright: "© 2026 FuegoBlade™. Todos los derechos reservados."
            }
        };

        const lang = localStorage.getItem("language") || "cs";
        const currentData = langData[lang] || langData["cs"];
        
        document.documentElement.lang = lang;
        document.getElementById("copyright-text").innerText = currentData.copyright;
        
        document.getElementById("section-title").innerHTML = `
            <span class="purple">${currentData.title1}</span> 
            <span class="white">${currentData.title2}</span>
        `;

        const contentBlocks = [
            { text: currentData.boot, cssClass: "text-boot" },
            { text: currentData.body, cssClass: "text-body" },
            { text: currentData.summaryTitle + currentData.summary, cssClass: "text-summary" }
        ];

        let blockIndex = 0;
        let charIndex = 0;
        const container = document.getElementById("typedText");
        let currentSpan = null;
        const typeSpeed = 15; 

        // --- AUDIO SYSTÉM PRO PÍPÁNÍ A TLAČÍTKO ---
        let audioCtx;
        let isSoundEnabled = false;

        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById("soundToggle");

            if (isSoundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                `;
            }
        }

        function playBeep() {
            if (!audioCtx || audioCtx.state === 'suspended' || !isSoundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch (e) {}
        }

        // --- EFEKT PSANÍ KÓDU ---
        function typeWriter() {
            if (blockIndex < contentBlocks.length) {
                if (charIndex === 0) {
                    currentSpan = document.createElement("span");
                    currentSpan.className = contentBlocks[blockIndex].cssClass;
                    container.appendChild(currentSpan);
                }
                
                let char = contentBlocks[blockIndex].text.charAt(charIndex);
                
                if (char === '\n') {
                    currentSpan.innerHTML += '<br>';
                } else {
                    currentSpan.innerHTML += char;
                }
                
                if (char !== ' ' && char !== '\n' && Math.random() > 0.6) {
                    playBeep();
                }

                charIndex++;
                
                if (charIndex >= contentBlocks[blockIndex].text.length) {
                    blockIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500);
                } else {
                    setTimeout(typeWriter, typeSpeed);
                }
            }
        }

        function goBack() {
            window.location.href = "web.html";
        }

        window.onload = () => {
            setTimeout(typeWriter, 400); 
        };
    </script>
</body>
</html>
