    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(143,0,255,0.1) 0%, #000 80%);
            z-index: -2;
        }

        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 30s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        /* Top Bar with Logo */
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        /* Back Arrow */
        .back-arrow {
            width: 16px;
            height: 16px;
            border-left: 2px solid #39ff14;
            border-bottom: 2px solid #39ff14;
            transform: rotate(45deg);
            cursor: pointer;
            filter: drop-shadow(0 0 6px #39ff14);
            transition: 0.3s;
        }
        
        .back-arrow:hover {
            transform: rotate(45deg) scale(1.1);
            filter: drop-shadow(0 0 10px #39ff14);
        }

        /* Top Right Controls (Sound + Logo) */
        .top-right-controls {
            display: flex;
            align-items: center;
        }

        /* Sound Toggle Button */
        .sound-toggle {
            cursor: pointer;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            color: #39ff14;
            filter: drop-shadow(0 0 5px rgba(57, 255, 20, 0.5));
        }

        .sound-toggle.active {
            color: #39ff14;
            filter: drop-shadow(0 0 8px #39ff14);
        }

        .sound-toggle svg {
            width: 100%;
            height: 100%;
        }

        /* FuegoBlade Logo */
        .logo-wrapper {
            background: #fff; 
            border-radius: 50%;
            width: 70px; 
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(143, 0, 255, 0.3);
            border: 2px solid #8F00FF; 
            margin-left: 25px;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Code Window */
        .code-window {
            max-width: 900px;
            margin: 120px auto 80px; 
            background: rgba(12, 12, 18, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(143,0,255,0.3);
            box-shadow: 0 0 40px rgba(143,0,255,0.15), inset 0 0 20px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
        }

        .code-header {
            margin-bottom: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .purple { color: #8F00FF; text-shadow: 0 0 10px rgba(143,0,255,0.5); }
        .white { color: #ffffff; }

        .code-content {
            white-space: pre-wrap;
            display: inline; /* To align correctly with the cursor */
        }

        /* Třídy pro formátování psaného textu */
        .text-boot { color: #39ff14; font-weight: bold; opacity: 0.8; }
        .text-body { color: #d1d1d1; font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; }
        .text-summary { color: #00e5ff; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); font-family: system-ui, -apple-system, sans-serif; font-size: 1.1rem; line-height: 1.7; display: block; margin-top: 20px; border-left: 3px solid #00e5ff; padding-left: 15px; }

        /* Neonový obdélníkový kurzor */
        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.1em;
            background: #39ff14;
            vertical-align: middle;
            margin-left: 5px;
            box-shadow: 0 0 10px #39ff14;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin: 40px 0 40px;
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .code-window { padding: 25px; margin: 100px 20px 20px; font-size: 0.95rem; }
            .code-header { font-size: 1.1rem; }
            .text-body, .text-summary { font-size: 1rem; }
            .logo-wrapper { width: 50px; height: 50px; margin-left: 15px; }
        }

                body: "1. Data Controller\nThe data controller is:\nRichard Zak\nMichael-Ulmer-Weg 10\n73235 Weilheim an der Teck\nGermany\nE-mail: richardzak@fuegoblade.com\n\nThe controller acts as a sole proprietor (Einzelunternehmer). Business registration details will be added upon issuance.\n\n----------------------------------------\n\n2. What Data We Process\nPulseMind™ may process the following data types:\n\n2.1 Data provided by the user\n- name, e-mail, login credentials\n- age, height, weight (if entered)\n- lifestyle and activity data\n- language preference\n\n2.2 Data necessary for app operation\n- technical device data\n- IP address\n- browser type / operating system\n- access time, cookies, localStorage\n- logs and diagnostic data\n\n2.3 Nutrition and activity data (voluntary)\nPulseMind™ works with data explicitly entered by the user, e.g.:\n- food photos\n- training outputs\n- sleep data\n- biometric values (optional)\n\n2.4 Payment data\nPayments are processed exclusively by Stripe. Stripe only provides us with: info on successful/failed payment, subscription type, transaction date. We do not receive any credit card details.\n\n----------------------------------------\n\n3. Purpose of Data Processing\nWe process personal data only for:\n- providing PulseMind™ services\n- personalizing user protocols\n- analytical AI calculations\n- ensuring security and technical operation\n- subscription billing\n- communicating with the user\n- fulfilling legal obligations\n\n----------------------------------------\n\n4. Legal Basis for Processing\nProcessing is based on:\n- Art. 6(1)(b) GDPR – performance of a contract\n- Art. 6(1)(a) GDPR – user consent\n- Art. 6(1)(f) GDPR – legitimate interest\n- Art. 6(1)(c) GDPR – compliance with legal obligations\n\n----------------------------------------\n\n5. Data Retention\nData is kept only as long as necessary:\n- accounting data: as per law (DE – usually 10 years)\n- user account: for the duration of service use\n                 body: "1. Responsable del Tratamiento\nEl responsable de los datos es:\nRichard Zak\nMichael-Ulmer-Weg 10\n73235 Weilheim an der Teck\nAlemania\nE-mail: richardzak@fuegoblade.com\n\nEl responsable actúa como propietario único (Einzelunternehmer). Los detalles del registro comercial se agregarán tras su emisión.\n\n----------------------------------------\n\n2. Qué datos procesamos\nPulseMind™ puede procesar los siguientes tipos de datos:\n\n2.1 Datos proporcionados por el usuario\n- nombre, correo, credenciales de inicio de sesión\n- edad, altura, peso (si se ingresan)\n- datos de estilo de vida y actividad\n- preferencia de idioma\n\n2.2 Datos necesarios para el funcionamiento de la app\n- datos técnicos del dispositivo\n- dirección IP\n- tipo de navegador / sistema operativo\n- hora de acceso, cookies, localStorage\n- registros y datos de diagnóstico\n\n2.3 Datos de nutrición y actividad (voluntario)\nPulseMind™ trabaja con datos ingresados explícitamente por el usuario, ej.:\n- fotos de comida\n- datos de entrenamiento\n- datos de sueño\n- valores biométricos (opcional)\n\n2.4 Datos de pago\nLos pagos son procesados exclusivamente por Stripe. Stripe solo nos proporciona: información sobre pago exitoso/fallido, tipo de suscripción, fecha de transacción. No recibimos detalles de tarjetas de crédito.\n\n----------------------------------------\n\n3. Propósito del Procesamiento de Datos\nProcesamos datos personales solo para:\n- proporcionar servicios PulseMind™\n- personalizar protocolos de usuario\n- cálculos analíticos de IA\n- garantizar seguridad y operación técnica\n- facturación de suscripción\n- comunicación con el usuario\n- cumplimiento de obligaciones legales\n\n----------------------------------------\n\n4. Base Legal para el Procesamiento\nEl procesamiento se basa en:\n- Art. 6(1)(b) RGPD – ejecución de un contrato\n- Art. 6(1)(a) RGPD – consentimiento del usuario\n- Art. 6(1)(f) RGPD – interés legítimo\n- Art. 6(1)(c) RGPD – cumplimiento de obligaciones legales\n\n----------------------------------------\n\n5. Retención de Datos\nLos datos se conservan solo el tiempo necesario:\n- datos contables: según la ley (DE – usualmente 10 años)\n- cuenta de usuario: durante el uso del servicio\n- datos analíticos: hasta que el usuario los elimine o cierre la cuenta\n- registros (logs): usualmente 30–90 días\nTras la cancelación de la cuenta, los datos se anonimizan o se eliminan de forma segura.\n\n----------------------------------------\n\n6. Transferencia de Datos a Terceros\nNO vendemos ni proporcionamos datos a terceros para marketing. Los datos se comparten solo con proveedores de servicios necesarios: Stripe (pagos), Supabase (base de datos) y Vercel (hosting). Existe un Acuerdo de Procesamiento de Datos (DPA) con todos ellos.\n\n----------------------------------------\n\n7. Cookies y localStorage\nEl servicio utiliza cookies técnicas, localStorage y datos analíticos solo dentro de la aplicación. El usuario puede limitar las cookies en la configuración de su navegador en cualquier momento.\n\n----------------------------------------\n\n8. Seguridad de los Datos\nLos datos están protegidos mediante transmisión cifrada (HTTPS), acceso controlado, mecanismos de autenticación y segmentación de bases de datos.\n\n----------------------------------------\n\n9. Derechos del Usuario bajo el RGPD\nEl usuario tiene derecho de acceso, rectificación, supresión (\"derecho al olvido\"), restricción del procesamiento, oposición, portabilidad de datos y retirada del consentimiento.\n\n----------------------------------------\n\n10. Elaboración de Perfiles y Decisiones de IA\nPulseMind™ utiliza IA para recomendaciones personalizadas y la interpretación de patrones biológicos. La IA no toma decisiones automatizadas vinculantes en el sentido del Art. 22 del RGPD.\n\n----------------------------------------\n\n11. Transferencia de Datos fuera de la UE\nSi los datos se transfieren fuera de la UE (ej. Stripe), se realiza solo en base a Cláusulas Contractuales Tipo (SCC) y cumple con el RGPD.\n\n----------------------------------------\n\n12. Cambios en el Documento\nLas políticas pueden actualizarse. El uso continuo constituye la aceptación de las políticas actualizadas.\n\n",

        const lang = localStorage.getItem("language") || "cs";
        const currentData = langData[lang] || langData["cs"];
        
        document.documentElement.lang = lang;
        document.getElementById("copyright-text").innerText = currentData.copyright;
        
        document.getElementById("section-title").innerHTML = `
            <span class="purple">${currentData.title1}</span> 
            <span class="white">${currentData.title2}</span>
        `;

        const contentBlocks = [
            { text: currentData.boot, cssClass: "text-boot" },
            { text: currentData.body, cssClass: "text-body" },
            { text: currentData.summaryTitle + currentData.summary, cssClass: "text-summary" }
        ];

        let blockIndex = 0;
        let charIndex = 0;
        const container = document.getElementById("typedText");
        let currentSpan = null;
        const typeSpeed = 5; // Rychlejší přepis pro dlouhý právní text

        // --- AUDIO SYSTÉM PRO PÍPÁNÍ A TLAČÍTKO ---
        let audioCtx;
        let isSoundEnabled = false;

        function toggleSound() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isSoundEnabled = !isSoundEnabled;
            const btn = document.getElementById("soundToggle");

            if (isSoundEnabled) {
                btn.classList.add('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                `;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                `;
            }
        }

        function playBeep() {
            if (!audioCtx || audioCtx.state === 'suspended' || !isSoundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch (e) {}
        }

        // --- EFEKT PSANÍ KÓDU ---
        function typeWriter() {
            if (blockIndex < contentBlocks.length) {
                if (charIndex === 0) {
                    currentSpan = document.createElement("span");
                    currentSpan.className = contentBlocks[blockIndex].cssClass;
                    container.appendChild(currentSpan);
                }
                
                let char = contentBlocks[blockIndex].text.charAt(charIndex);
                
                if (char === '\n') {
                    currentSpan.innerHTML += '<br>';
                } else {
                    currentSpan.innerHTML += char;
                }
                
                if (char !== ' ' && char !== '\n' && Math.random() > 0.6) {
                    playBeep();
                }

                charIndex++;
                
                if (charIndex >= contentBlocks[blockIndex].text.length) {
                    blockIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 300);
                } else {
                    setTimeout(typeWriter, typeSpeed);
                }
            }
        }

        function goBack() {
            window.location.href = "web.html";
        }

        window.onload = () => {
            setTimeout(typeWriter, 400); 
        };
    </script>
